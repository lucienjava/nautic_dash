name: Build NauticDash APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Flutter APK Debug
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter 3.22
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Create Flutter scaffold
        run: flutter create nautic_dash --project-name nautic_dash --org fr.nauticdash --platforms android

      - name: Inject sources
        run: |
          python3 -c "
          import base64
          open('nautic_dash/pubspec.yaml','wb').write(base64.b64decode(''))
          open('nautic_dash/lib/main.dart','wb').write(base64.b64decode(''))
          open('nautic_dash/test/widget_test.dart','wb').write(base64.b64decode('aW1wb3J0ICdwYWNrYWdlOmZsdXR0ZXJfdGVzdC9mbHV0dGVyX3Rlc3QuZGFydCc7CmltcG9ydCAncGFja2FnZTpuYXV0aWNfZGFzaC9tYWluLmRhcnQnOwoKdm9pZCBtYWluKCkgewogIHRlc3RXaWRnZXRzKCdzbW9rZSB0ZXN0JywgKFdpZGdldFRlc3RlciB0ZXN0ZXIpIGFzeW5jIHsKICAgIGF3YWl0IHRlc3Rlci5wdW1wV2lkZ2V0KGNvbnN0IE5hdXRpY0Rhc2hBcHAoKSk7CiAgfSk7Cn0K'))
          print('Sources OK')"

      - name: Patch AndroidManifest
        run: |
          cat > nautic_dash/android/app/src/main/AndroidManifest.xml << 'ENDXML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>
              <uses-permission android:name="android.permission.CHANGE_WIFI_MULTICAST_STATE"/>
              <application android:label="NauticDash"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize"
                      android:screenOrientation="sensorLandscape">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          ENDXML

      - name: flutter pub get
        working-directory: nautic_dash
        run: flutter pub get

      - name: flutter analyze
        working-directory: nautic_dash
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: flutter build apk --debug
        working-directory: nautic_dash
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NauticDash-debug-${{ github.sha }}
          path: nautic_dash/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Summary
        run: |
          echo '## NauticDash V3 APK OK' >> $GITHUB_STEP_SUMMARY
          SIZE=$(du -sh nautic_dash/build/app/outputs/flutter-apk/app-debug.apk | cut -f1)
          echo "APK: $SIZE" >> $GITHUB_STEP_SUMMARY
